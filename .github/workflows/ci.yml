name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Test import
        run: |
          python -c "import honestdid as hd; print(f'Version: {hd.__version__}')"
          python -c "import honestdid as hd; print(f'Functions: {len(hd.__all__)}')"

      - name: Run example
        run: |
          cd examples
          python basic_usage.py
